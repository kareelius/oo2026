<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <script>
        // Classes for conversion
        class CmToIn {
            calculate(x) { return x / 2.54; }
            inputUnit() { return "cm"; }
            outputUnit() { return "in"; }
        }

        class InToCm {
            calculate(x) { return x * 2.54; }
            inputUnit() { return "in"; }
            outputUnit() { return "cm"; }
        }

        let calculator = null;

        function startPage() {
            calculator = new CmToIn(); // Start with Cm → In
            updateUnits();
            setupInputListener();
        }

        function updateUnits() {
            document.getElementById("type1").innerText = calculator.inputUnit();
            document.getElementById("type2").innerText = calculator.outputUnit();
            document.getElementById("input1").value = "";
            document.getElementById("answer").innerText = "";
        }

        function setupInputListener() {
            const inputField = document.getElementById("input1");
            inputField.addEventListener("input", () => {
                const val = parseFloat(inputField.value);
                if (!isNaN(val)) {
                    const result = calculator.calculate(val);
                    document.getElementById("answer").innerText = result.toFixed(2);
                } else {
                    document.getElementById("answer").innerText = "";
                }
            });
        }

        function toggleCalculator() {
            calculator = calculator instanceof CmToIn ? new InToCm() : new CmToIn();
            updateUnits();
        }
    </script>
</head>

<body onload="startPage()">
    <h1>Unit Converter</h1>
    <input type="number" id="input1" placeholder="Enter value">
    <span id="type1"></span>
    <span>=</span>
    <span id="answer"></span>
    <span id="type2"></span>
    <br><br>
    <input type="button" value="Toggle Cm ↔ In" onclick="toggleCalculator()">
</body>

</html>
