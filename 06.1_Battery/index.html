<!DOCTYPE html>
<html>
<head>
  <title>Battery Simulator</title>
</head>
<body>

  <!-- Title -->
  <h1>🔋 Battery Simulator</h1>

  <!-- Input field for seconds -->
  <input type="number" id="seconds" placeholder="Enter seconds" />

  <!-- Button triggers charging -->
  <button onclick="chargeBattery()">Charge</button>

  <!-- Output messages -->
  <p id="status"></p>
  <p id="percentage"></p>

  <!-- Compiled JavaScript file -->
  <script src="script.js"></script>

</body>
</html>
