<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<script src="03_Calculator.js"></script>

<script>

let calcobj = null;

// Runs when page loads
function startPage(){
    calcobj = new Calculator();
    updatePanel();
}

// Handles button clicks
function buttonPress(event){
    const value = event.target.value;
    calcobj.pressButton(value);
    updatePanel();
}

// Updates the calculator display
function updatePanel(){
    document.getElementById("panel1").value = calcobj.getPanelContent();
}

</script>

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:#f2f2f2;
    font-family:Arial;
}

#calculator{
    background:white;
    padding:25px;
    border:2px solid black;
    border-radius:10px;
    width:320px;
}

/* Display screen */

#panel1{
    width:100%;
    height:60px;
    margin-bottom:15px;
    font-size:30px;
    text-align:right;
    padding:0 10px;
    border:2px solid black;
    box-sizing:border-box;
}

/* Grid layout for buttons */

#buttons{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

/* Button styling */

button{
    height:60px;
    font-size:22px;
    cursor:pointer;
}

button:hover{
    background:#ddd;
}

</style>
</head>

<body onload="startPage()">

<div id="calculator">

<input id="panel1" readonly>

<div id="buttons">

<button onclick="buttonPress(event)" value="7">7</button>
<button onclick="buttonPress(event)" value="8">8</button>
<button onclick="buttonPress(event)" value="9">9</button>
<button onclick="buttonPress(event)" value="/">/</button>

<button onclick="buttonPress(event)" value="4">4</button>
<button onclick="buttonPress(event)" value="5">5</button>
<button onclick="buttonPress(event)" value="6">6</button>
<button onclick="buttonPress(event)" value="*">*</button>

<button onclick="buttonPress(event)" value="1">1</button>
<button onclick="buttonPress(event)" value="2">2</button>
<button onclick="buttonPress(event)" value="3">3</button>
<button onclick="buttonPress(event)" value="-">-</button>

<button onclick="buttonPress(event)" value="0">0</button>
<button onclick="buttonPress(event)" value=".">.</button>
<button onclick="buttonPress(event)" value="=">=</button>
<button onclick="buttonPress(event)" value="+">+</button>

<button onclick="buttonPress(event)" value="C" style="grid-column: span 4; background:#ffb3b3;">C</button>

</div>

</div>

</body>
</html>
