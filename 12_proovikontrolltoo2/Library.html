<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library System</title>
</head>
<body>

<h1>Library System</h1>

<label>Type:</label>

<select id="type" onchange="updateForm()">
    <option value="book">Book</option>
    <option value="dvd">DVD</option>
</select>

<br><br>

<input id="id" placeholder="ID">
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<input id="year" placeholder="Year">

<span id="book-fields">
    <input id="pages" placeholder="Pages">
</span>

<span id="dvd-fields" style="display:none;">
    <input id="duration" placeholder="Duration">
</span>

<br><br>

<button onclick="addItem()">Add Item</button>

<hr>

<h3>Search</h3>

<input id="searchText" placeholder="Search by title">

<button onclick="searchItems()">Search</button>

<button onclick="showItems()">Show All</button>

<hr>

<h3>Items</h3>

<div id="output"></div>

<hr>

<h3>Import JSON</h3>

<input type="file" id="fileInput">

<button onclick="importJson()">Import</button>

<hr>

<h3>Export JSON</h3>

<button onclick="exportJson()">Export</button>

<script type="module">

import { Library, Book, DVD } from "./Library.js";

let library = null;

startPage();

function startPage(){

    library = new Library();

    updateForm();

    showItems();
}

function updateForm(){

    const type = document.getElementById("type").value;

    const bookFields =
        document.getElementById("book-fields");

    const dvdFields =
        document.getElementById("dvd-fields");

    if(type === "book"){

        bookFields.style.display = "inline";

        dvdFields.style.display = "none";
    }

    else {

        bookFields.style.display = "none";

        dvdFields.style.display = "inline";
    }
}

function addItem(){

    const type =
        document.getElementById("type").value;

    let item;

    try {

        if(type === "book"){

            item = new Book(
                document.getElementById("id").value,
                document.getElementById("title").value,
                document.getElementById("author").value,
                Number(document.getElementById("year").value),
                Number(document.getElementById("pages").value)
            );
        }

        else {

            item = new DVD(
                document.getElementById("id").value,
                document.getElementById("title").value,
                document.getElementById("author").value,
                Number(document.getElementById("year").value),
                Number(document.getElementById("duration").value)
            );
        }

        library.addItem(item);

        showItems();

    } catch(e){

        alert(e.message);
    }
}

function showItems(){

    const output =
        document.getElementById("output");

    if(library.items.length === 0){

        output.innerHTML = "No items";

        return;
    }

    let text = "";

    for(let item of library.items){

        text += item.getSummary() + "<br>";
    }

    output.innerHTML = text;
}

function searchItems(){

    const text =
        document.getElementById("searchText").value;

    const result =
        library.searchByTitle(text);

    const output =
        document.getElementById("output");

    if(result.length === 0){

        output.innerHTML = "No results";

        return;
    }

    let html = "";

    for(let item of result){

        html += item.getSummary() + "<br>";
    }

    output.innerHTML = html;
}

function exportJson(){

    const data =
        JSON.stringify(library.items, null, 2);

    const blob = new Blob(
        [data],
        { type: "application/json" }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download = "library.json";

    a.click();
}

function importJson(){

    const file =
        document.getElementById("fileInput").files[0];

    if(!file){
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const data =
            JSON.parse(e.target.result);

        library.items = [];

        for(let item of data){

            if(item.pages){

                library.addItem(
                    new Book(
                        item.id,
                        item.title,
                        item.author,
                        item.year,
                        item.pages
                    )
                );
            }

            else {

                library.addItem(
                    new DVD(
                        item.id,
                        item.title,
                        item.author,
                        item.year,
                        item.duration
                    )
                );
            }
        }

        showItems();
    };

    reader.readAsText(file);
}

window.addItem = addItem;
window.updateForm = updateForm;
window.exportJson = exportJson;
window.importJson = importJson;
window.searchItems = searchItems;
window.showItems = showItems;

</script>

</body>
</html>
