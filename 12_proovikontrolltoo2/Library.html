<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library</title>

    <!-- LAE JS FAIL ESIMESENA -->
    <script src="Library.js"></script>

    <script>
        let library = null;

        function startPage(){
            library = new Library();
            showItems();
        }

        function updateForm(){
            const type = document.getElementById("type").value;

            document.getElementById("book-fields").style.display =
                type === "book" ? "" : "none";

            document.getElementById("dvd-fields").style.display =
                type === "dvd" ? "" : "none";
        }

        function addItem(){
            const type = document.getElementById("type").value;
            let item;

            try{
                if (type === "book"){
                    item = new Book(
                        document.getElementById("id").value,
                        document.getElementById("title").value,
                        document.getElementById("author").value,
                        Number(document.getElementById("year").value),
                        Number(document.getElementById("pages").value),
                        document.getElementById("ISBN").value
                    );
                } else {
                    item = new DVD(
                        document.getElementById("id").value,
                        document.getElementById("title").value,
                        document.getElementById("author").value,
                        Number(document.getElementById("year").value),
                        Number(document.getElementById("duration").value)
                    );
                }

                library.addItem(item);
                showItems();

            } catch (e){
                alert(e.message);
            }
        }

        function showItems(){
            const output = document.getElementById("output");

            if (!library || library.items.length === 0){
                output.innerHTML = "No items";
                return;
            }

            let text = "";

            for (let item of library.items){
                text += item.getSummary() + "<br>";
            }

            output.innerHTML = text;
        }

        function loadFile(){
            alert("Not implemented");
        }

        function download(){
            alert("Not implemented");
        }
    </script>
</head>

<body onload="startPage()">
    <h1>Library system</h1>

    <select id="type" onchange="updateForm()">
        <option value="book">Book</option>
        <option value="dvd">DVD</option>
    </select>

    <br><br>

    <input id="id" placeholder="ID">
    <input id="title" placeholder="Title">
    <input id="author" placeholder="Author">
    <input id="year" placeholder="Year">

    <span id="book-fields">
        <input id="pages" placeholder="Pages">
        <input id="ISBN" placeholder="ISBN">
    </span>

    <span id="dvd-fields" style="display:none;">
        <input id="duration" placeholder="Duration">
    </span>

    <br><br>
    <button onclick="addItem()">Add</button>

    <hr>
    <div id="output"></div>
</body>
</html>
